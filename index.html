<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Fontdiner+Swanky&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
        
      html, body { min-height: 100dvh; }
      body {
          font-family: 'Quicksand', sans-serif;
          background: linear-gradient(135deg, #fdf2f8 0%, #f472b6 100%) fixed;
          margin: 0; color: #4c1d95;
      }
      #pet-name { font-family: "Fontdiner Swanky", serif; }
      .stat-row {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;    
          width: 100%;
          letter-spacing: 0.5px;
          white-space: nowrap;
      }

       @media (max-width: 640px) {
       body {
        padding: 0 !important;
        overflow-y: auto !important;
       }
      }
  </style>
  <title>JS - 8.2 Tamagochi (Arcade Edition)</title>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="bg-white/80 backdrop-blur-2xl border-4 border-white w-full max-w-4xl rounded-[40px] shadow-[0_30px_60px_rgba(0,0,0,0.15)] overflow-hidden grid grid-cols-1 md:grid-cols-12">       
        <div class="md:col-span-5 bg-linear-to-b from-pink-100/50 to-purple-100/30 p-8 flex flex-col items-center justify-center border-b-4 md:border-b-0 md:border-r-4 border-pink-200 text-center">
            <h1 id="pet-name" class="text-3xl font-bold mb-6 text-transparent bg-clip-text bg-linear-to-r from-pink-600 to-purple-600 uppercase tracking-wide"></h1>
            
            <div class="w-56 h-56 sm:w-64 sm:h-64 animated-pet bg-white rounded-3xl border-4 border-pink-300 p-3 shadow-xl flex items-center justify-center">
                <img id="pet-avatar" src="./img/minnie_normal.jpg" alt="Tamagotchi" class="max-w-full max-h-full object-contain rounded-xl filter drop-shadow-md">
            </div>
            
            <p id="game-over-msg" class="text-rose-500 font-black text-lg hidden animate-pulse mt-6">⚠️ ¡GAME OVER! ⚠️</p>
        </div>

        <div class="md:col-span-7 p-6 md:p-10 flex flex-col justify-center bg-white/40">
         
            <div id="stats-container" class="hidden bg-white/90 p-3 border-2 border-pink-200 rounded-2xl mb-6 shadow-inner text-pink-900">
            </div>

            <div id="panel-botones" class="grid grid-cols-2 gap-3.5">
                <button id="btn-alimentar" class="bg-amber-400 hover:bg-amber-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-amber-200 text-lg tracking-wide">ALIMENTAR</button>
                <button id="btn-jugar" class="bg-teal-400 hover:bg-teal-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-teal-100 text-lg tracking-wide">JUGAR</button>
                <button id="btn-dormir" class="bg-indigo-400 hover:bg-indigo-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-indigo-100 text-lg tracking-wide">DORMIR</button>
                <button id="btn-duchar" class="bg-sky-400 hover:bg-sky-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-sky-100 text-lg tracking-wide">DUCHAR</button>
                <button id="btn-reprender" class="bg-rose-400 hover:bg-rose-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-rose-100 text-lg tracking-wide">REPRENDER</button>
                <button id="btn-acariciar" class="bg-pink-400 hover:bg-pink-300 text-white py-3.5 font-bold rounded-2xl cursor-pointer transition-all shadow-md shadow-pink-100 text-lg tracking-wide">ACARICIAR</button>
            </div>

            <button id="btn-reiniciar" class="hidden w-full text-center text-white font-bold bg-fuchsia-500 hover:bg-fuchsia-400 active:translate-y-1 py-4 rounded-full border-b-4 border-fuchsia-700 shadow-md transition-all cursor-pointer tracking-widest uppercase text-sm">
                🎮 REINICIAR JUEGO
            </button>
        </div>
    </div>

    <script src="./js/classTamagochi.js"></script>
    <script src="./js/newTamagochi.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
